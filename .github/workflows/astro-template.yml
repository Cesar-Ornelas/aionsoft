name: Astro Template CI

on:
  push:
    tags:
      - astro-template-v*
    paths:
      - templates/astro/**
      - .github/workflows/astro-template.yml
  pull_request:
    paths:
      - templates/astro/**
      - .github/workflows/astro-template.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish package to GitHub Packages
        required: true
        type: boolean
        default: false

jobs:
  validate:
    name: Validate Astro Template Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: templates/astro

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create package tarball
        id: pack
        run: |
          package_file=$(npm pack)
          echo "package_file=$package_file" >> "$GITHUB_OUTPUT"

      - name: Smoke test generator
        run: |
          npm run test:smoke
          test -f ./tmp-smoke/package.json
          test -f ./tmp-smoke/src/pages/index.astro

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-template-package
          path: templates/astro/${{ steps.pack.outputs.package_file }}
          if-no-files-found: error

      - name: Cleanup smoke output
        if: always()
        run: rm -rf ./tmp-smoke ./*.tgz

  publish:
    name: Publish Astro Template Package
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/astro-template-v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@aionsoft'

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: astro-template-package
          path: dist

      - name: Publish package tarball
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish ./dist/*.tgz
