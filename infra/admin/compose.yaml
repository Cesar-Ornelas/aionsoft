services:
  admin:
    container_name: aionsoft-admin
    build:
      context: ../..
      dockerfile: docker/admin.Dockerfile
    restart: unless-stopped
    ports:
      - "${ADMIN_APP_PORT:-3003}:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME}
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${CLOUDFLARE_R2_ACCESS_KEY_ID}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY}
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT}
      LOGTO_APP_ID: ${LOGTO_APP_ID}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET}
      LOGTO_M2M_APP_ID: ${LOGTO_M2M_APP_ID}
      LOGTO_M2M_APP_SECRET: ${LOGTO_M2M_APP_SECRET}
      LOGTO_COOKIE_ENCRYPTION_KEY: ${LOGTO_COOKIE_ENCRYPTION_KEY}
      LOGTO_MANAGEMENT_RESOURCE: ${LOGTO_MANAGEMENT_RESOURCE}
      TASK_MAINTENANCE_SECRET: ${TASK_MAINTENANCE_SECRET}
    networks:
      - dokploy-network

  ofelia:
    container_name: aionsoft-admin-ofelia
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    depends_on:
      - admin
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      ofelia.job-exec.task-maintenance.schedule: ${TASK_MAINTENANCE_SCHEDULE:-0 * * * *}
      ofelia.job-exec.task-maintenance.no-overlap: "true"
      ofelia.job-exec.task-maintenance.container: aionsoft-admin
      ofelia.job-exec.task-maintenance.command: bun run task:maintenance
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true