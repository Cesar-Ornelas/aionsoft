services:
  postgres:
    container_name: ${PROJECT_NAME:-aionsoft}-portal-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portal}
      POSTGRES_USER: ${POSTGRES_USER:-aionsoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      LOGTO_DB_NAME: ${LOGTO_DB_NAME:-logto}
    ports:
      - "5432:5432"
    volumes:
      - portal_postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-aionsoft} -d ${POSTGRES_DB:-portal}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  logto:
    container_name: ${PROJECT_NAME:-aionsoft}-logto
    image: svhd/logto:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "-c", "npx @logto/cli db seed --swe; npm start"]
    environment:
      TRUST_PROXY_HEADER: 1
      DB_URL: postgresql://${POSTGRES_USER:-aionsoft}:${POSTGRES_PASSWORD:-password}@postgres:5432/${LOGTO_DB_NAME:-logto}
      ENDPOINT: ${LOGTO_ENDPOINT:-http://localhost:3001}
      ADMIN_ENDPOINT: ${LOGTO_ADMIN_ENDPOINT:-http://localhost:3002}
    ports:
      - "3001:3001"
      - "3002:3002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  portal_postgres_data: