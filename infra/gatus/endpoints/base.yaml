storage:
  type: postgres
  path: ${DATABASE_URL}

web:
  port: 8080

ui:
  title: Aionsoft Status

security:
  oidc:
    issuer-url: "${GATUS_SECURITY_OIDC_ISSUER_URL}"
    redirect-url: "${GATUS_SECURITY_OIDC_REDIRECT_URL}"
    client-id: "${GATUS_SECURITY_OIDC_CLIENT_ID}"
    client-secret: "${GATUS_SECURITY_OIDC_CLIENT_SECRET}"
    scopes: ["openid", "email", "profile"]